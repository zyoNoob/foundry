# RunPod Serverless Template for Foundry
# ==============================================================================

name: foundry-qwen35-35b-a3b
description: Foundry inference endpoint for Qwen3.5-35B-A3B

# Docker image
image: ghcr.io/infernet-org/foundry/qwen3.5-35b-a3b:latest

# Serverless configuration
serverless:
  min_workers: 0
  max_workers: 10
  idle_timeout: 300
  
# Ports
# (Not strictly needed for Queue-based endpoints since RunPod SDK polls the queue, 
# but good practice for internal container routing)
ports:
  - container_port: 8080
    protocol: HTTP

env:
  FOUNDRY_PORT: "8080"
