# RunPod Serverless Template for Foundry
# ==============================================================================

name: foundry-qwen35-35b-a3b
description: Foundry inference endpoint for Qwen3.5-35B-A3B

# Docker image
image: ghcr.io/infernet-org/foundry/qwen3.5-35b-a3b:latest

# Serverless configuration
serverless:
  min_workers: 0
  max_workers: 10
  idle_timeout: 300
  
# Network (Load Balancing Mode)
# 8080 = App, 8081 = Health
ports:
  - container_port: 8080
    protocol: HTTP
  - container_port: 8081
    protocol: HTTP

env:
  PORT: "8080"
  PORT_HEALTH: "8081"
